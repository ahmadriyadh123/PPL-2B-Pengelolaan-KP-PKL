version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kpms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db-account
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./.docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - kpms-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: kpms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    networks:
      - kpms-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kpms-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: unless-stopped
    networks:
      - kpms-network

  service-registry:
    build: ./service-registry
    container_name: kpms-service-registry
    ports:
      - "8761:8761"
    restart: unless-stopped
    networks:
      - kpms-network

  account-service:
    build: ./account-service
    container_name: kpms-account-service
    # File .env wajib ada (copy dari .env.example, lalu isi JWT_SECRET acak).
    # Kalau JWT_SECRET kosong/lemah, JwtUtil akan gagal start dengan pesan jelas.
    env_file:
      - ./account-service/.env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db-account?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_started
    restart: unless-stopped
    networks:
      - kpms-network

  participant-service:
    build: ./participant-service
    container_name: kpms-participant-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db-participant?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_started
    restart: unless-stopped
    networks:
      - kpms-network

  company-service:
    build: ./company-service
    container_name: kpms-company-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db-company?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_started
    restart: unless-stopped
    networks:
      - kpms-network

  management-content-service:
    build: ./management-content-service
    container_name: kpms-management-content-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db-management-content?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_started
    restart: unless-stopped
    networks:
      - kpms-network

  mapping-service:
    build: ./mapping-service
    container_name: kpms-mapping-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db-mapping?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_started
    restart: unless-stopped
    networks:
      - kpms-network

  grade-service:
    build: ./grade-service
    container_name: kpms-grade-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db-grade?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped
    networks:
      - kpms-network

  api-gateway:
    build: ./api-gateway
    container_name: kpms-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    ports:
      - "8080:8080"
    depends_on:
      service-registry:
        condition: service_started
    restart: unless-stopped
    networks:
      - kpms-network

volumes:
  mysql-data:

networks:
  kpms-network:
    driver: bridge