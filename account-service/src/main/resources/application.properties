# ===============================
#   JSON WEB TOKEN
# ===============================
# Secret diambil dari environment variable JWT_SECRET (wajib, minimal 64 byte base64).
# Default kosong dipakai supaya aplikasi gagal start kalau secret lupa diset.
jwt.secret=${JWT_SECRET:}
jwt.tokenExpirationMsec=${JWT_ACCESS_EXP_MS:900000}
jwt.refreshTokenExpirationMsec=${JWT_REFRESH_EXP_MS:604800000}
jwt.accessTokenCookieName=accessToken
jwt.refreshTokenCookieName=refreshToken

# ===============================
#   DATA SOURCE
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:db-account}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# ===============================
#   JPA / HIBERNATE
# ===============================
spring.jpa.show-sql = true
spring.jpa.hibernate.ddl-auto = update
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect

# ===============================
#   SWAGGER UI / SPRING FOX
# ===============================
spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER

# ===============================
#   SPRING
# ===============================
spring.main.allow-circular-references=true

# ===============================
#   SCHEDULED JOB CREDENTIALS
# ===============================
# Kredensial dipakai oleh AccountService.deleteParticipantAccountJob untuk login
# sebagai panitia tiap prodi. Set lewat env var; kalau kosong, job di-skip.
app.scheduled-job.d3.username=${SCHEDULED_JOB_D3_USERNAME:}
app.scheduled-job.d3.password=${SCHEDULED_JOB_D3_PASSWORD:}
app.scheduled-job.d4.username=${SCHEDULED_JOB_D4_USERNAME:}
app.scheduled-job.d4.password=${SCHEDULED_JOB_D4_PASSWORD:}