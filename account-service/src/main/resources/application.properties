# ===============================
#   JSON WEB TOKEN
# ===============================
jwt.secret = token
jwt.tokenExpirationMsec = 9999999999
jwt.refreshTokenExpirationMsec = 999999999
jwt.accessTokenCookieName = accessToken
jwt.refreshTokenCookieName = refreshToken

# ===============================
#   DATA SOURCE
# ===============================
spring.datasource.url = jdbc:mysql://mysql:3306/db-account?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username = root
spring.datasource.password = root

# ===============================
#   JPA / HIBERNATE
# ===============================
spring.jpa.show-sql = true
spring.jpa.hibernate.ddl-auto = update
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect

# ===============================
#   SWAGGER UI / SPRING FOX
# ===============================
spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER

# ===============================
#   SPRING
# ===============================
spring.main.allow-circular-references=true